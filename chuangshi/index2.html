<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>创世2</title>
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" href="插件/animation.css">
	<style>
		#body{
			width: 360px;
			height: 610px;
			margin: 0 auto;
			position: relative;
			overflow: hidden;
		}
		
		.tp{
			width: 25px;
			height: 25px;
			position: absolute;
			top: 580px;
			right: 12px;
			z-index: 5;
			cursor: pointer;
		}
			
		.content{
			width: 360px;
			height: calc(610px*6);
			position: relative;
			top: 0;
			left: 0;
			padding: 1px;

		}

		


		.body9{
			width: 360px;
			height: 610px;
			position: relative;
			overflow: hidden;
			background-size: 100% 100%;
		}
		
		.imgH1{
			width: 30px;
			position: absolute;
			top: 8px;
			left: 35px;
			
		}
		.imgH2{
			width: 130px;
			position: absolute;
			top: 40px;
			left:10px;
			z-index: 1;
	
		}
		
		.imgH3{
			width: 125px;
			height:100px;
			position: absolute;
			top: 40px;
			left: 90px;
			z-index: 3;
		
		}
		
		.imgH4{
			width: 140px;
			height: 110px;
			position: absolute;
			top: 45px;
			right:20px;
			z-index: 2;
	
		}
		.imgH5{
			width: 45px;
			position: absolute;
			top: 180px;
			right: 20px;
			z-index: 2;
			
		}
		.imgH6{
			width: 100px;
			position: absolute;
			top: 290px;
			left:50%;
			transform:translateX(-50%);
			z-index: 1;
		}
		
		.imgH7{
			width: 300px;
			position: absolute;
			z-index: 4;
			top: 85px;
			left:50%;
			transform:translateX(-50%);
		}
		
		.imgH8{
			width: 230px;
			position: absolute;
			left: 50%;
			top: 190px;
			z-index: 3;
			transform:translateX(-50%);
		}
		.imgH9{
			width: 70px;
			position: absolute;
			left: 50%;
			top: 310px;
			z-index: 4;
			transform:translate(-50%,-50%);

		}
		.imgH10{
			width: 280px;
			position: absolute;
			top: 400px;
			left:50%;
			transform:translateX(-50%);
		}
		.imgH11{
			width: 150px;
			position: absolute;
			left: 50%;
			bottom: 120px;
			transform:translateX(-50%);
		}
		.imgH12{
			width: 100px;
			position: absolute;
			left: 50%;
			bottom: 90px;
			transform:translateX(-50%);
		}
		.imgH13{
			width: 130px;
			position: absolute;
			left: 50%;
			bottom: 30px;
			transform:translateX(-50%);
		}
		.tp9{
			width: 30px;
			height: 12px;
			position: absolute;
			bottom: 10px;
			left: 50%;
			transform:translateX(-50%);
		}	
	</style>
</head>
<body>
	<div id="body">
		<audio src="music/1.mp3" loop autoplay  id="player" style='opacity:0;position:relative;z-index:-5;right:0;top:5px;'>
			<source src="音频/1.mp3" type="audio/mp3"></source>
		</audio>
		<img src="music/musicoff.png" alt="" class="tp">
		<div class="content">
			
			<div class="body9" style='background-image:url(img9/bg.jpg)'>
				<!-- img.imgC$[src='img9/$.png']*12 -->
				<img src="img9/1.png" alt="" class="imgH1">
				<img src="img9/2.png" alt="" class="imgH2">
				<img src="img9/3.png" alt="" class="imgH3">
				<img src="img9/4.png" alt="" class="imgH4">
				<img src="img9/5.png" alt="" class="imgH5">
				<img src="img9/6.gif" alt="" class="imgH6">
				<img src="img9/7.png" alt="" class="imgH7">
				<img src="img9/8.png" alt="" class="imgH8">
				<img src="img9/9.png" alt="" class="imgH9">
				<img src="img9/10.png" alt="" class="imgH10">
				<img src="img9/11.png" alt="" class="imgH11">
				<img src="img9/11.png" alt="" class="imgH12">
				<img src="img9/11.png" alt="" class="imgH13">
				<img src="music/slide.png" alt="" class="tp9">
			</div>
		</div>
	</div>	
</body>
<script src='插件/jquery-2.1.4.min.js'></script>
<script src='插件/zepto.min.js'></script>
<script>
Zepto(function($){
		//打开声音
	$('.tp').click(function(){
		if (player.paused) {
			player.play();
			$('.tp').attr('src','music/music.png')
		}else{
			player.pause();
			$('.tp').attr('src','music/musicoff.png')
			}
		})
		// 封装定时器,作为延迟
	var pn=0;
	$('body').swipeUp(function(){
		if (pn==9) return;
		pn++;
		$('.content').animate({
			top:-611*pn
		},500,function(){
			if ($('.content').position().top==0) {
				mmp8()
			}
			if ($('.content').position().top==-611) {
				mgd8()
			};
			if ($('.content').position().top==-611*2) {
			};
			if ($('.content').position().top==-611*3) {
			};
			if ($('.content').position().top==-611*4) {
			};
		})
		
	})
	$('body').swipeDown(function(){
		if (pn==0) return;
		pn--;
		$('.content').animate({
			top:-611*pn
		},500,function(){
			if ($('.content').position().top==0) {
				mmp8()
			}
			if ($('.content').position().top==-611) {
				mgd8()
			};
			if ($('.content').position().top==-611*2) {
			};
			if ($('.content').position().top==-611*3) {
			};
			if ($('.content').position().top==-611*4) {
			};
		})
	})
	// mmp8()
	var timer1,timer2,timer3,timer4A,timer4B,timer5,timer6A,timer6B,timer6C,timer7A,timer7B,timer7C,timer7D,timer7E,timer8A,timer8B,timer8C,timer8D,timer8E,timer8F,timer8G;

	function mmp8(){
		
		$('.imgg2').animate({
			top:30,
			left:25
		},1500);
		$('.imgG3').animate({
			top:25,
			left:90
		},2000);
		$('.imgG4').animate({
			top:25,
			right:25
		},1500);
		timer8A=setTimeout(function(){
			$('.imgG1').animate({
				top:30,
				left:-15
			},1000);
			$('.imgG5').animate({
			top:105,
			right:30
			},1000);
			$('.imgG6').animate({
				top:-5,
				right:-15
			},1000);
		},2200)
		timer8B=setTimeout(function(){
			$('.imgG7').animate({
				top:75,
				left:110
			},2000);
		},3000)
		timer8C=setTimeout(function(){
			$('.imgG8').fadeIn(1200)
		},5000)
		timer8D=setTimeout(function(){
			$('.imgG9').fadeIn(1200)
		},6500)
		timer8E=setTimeout(function(){
			$('.imgG10').fadeIn(1200)
		},7900)
		timer8F=setTimeout(function(){
			$('.imgG11').fadeIn(1200)
		},9300)
		timer8G=setTimeout(function(){
			$('.imgG12').fadeIn(1200)
		},10500)
	}
	function mgd8(){
		clearTimeout(timer8A)
		clearTimeout(timer8B)
		clearTimeout(timer8C)
		clearTimeout(timer8D)
		clearTimeout(timer8E)
		clearTimeout(timer8F)
		clearTimeout(timer8G)
		$('.imgG1').css({
			top:30,
			left:-500
		});
		$('.imgG2').css({
			top:30,
			left:800
		});
		$('.imgG3').css({
			top:600,
			left:800
		});
		$('.imgG4').css({
			top:25,
			right:800
		});
		$('.imgG5').css({
			top:105,
			right:-500
		});
		$('.imgG6').css({
			top:-5,
			right:-500
		});
		$('.imgG7').css({
			top:75,
			left:800
		});
		$('.imgG8').fadeOut()
		$('.imgG9').fadeOut()
		$('.imgG10').fadeOut()
		$('.imgG11').fadeOut()
		$('.imgG12').fadeOut()
	}








	})
</script>
</html>
